version: '3.8'
services:
  # 1. Database Deret Waktu untuk Menyimpan Miliaran Data Transaksi
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: smartmoney_db
    environment:
      - POSTGRES_DB=smart_money
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secret
    ports:
      - "5432:5432"
    volumes:
      - ts_data:/var/lib/postgresql/data
    restart: always

  # 2. Cache In-Memory Layer untuk Distribusi Kilat WebSocket
  redis:
    image: redis:7-alpine
    container_name: smartmoney_cache
    ports:
      - "6379:6379"
    restart: always

  # 3. Backend Core API (FastAPI)
  backend:
    build: ./backend
    container_name: smartmoney_backend
    ports:
      - "8000:8000"
    depends_on:
      - timescaledb
      - redis
    restart: always

volumes:
  ts_data:
